<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>后台管理</title>
    <style>
        body{font-family:Arial,sans-serif;max-width:600px;margin:50px auto;padding:20px;text-align:center}
        h1{color:#333;font-size:24px;margin-bottom:20px}
        .hint{color:#999;font-size:14px;margin-top:100px}
        .secret-zone{position:absolute;width:100px;height:100px;cursor:pointer;opacity:0}
        .secret-zone-1{top:0;left:0}
        .secret-zone-2{top:0;right:0}
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000}
        .modal{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:30px;border-radius:8px;min-width:300px;max-width:90%}
        .modal h2{margin-top:0;font-size:18px}
        .modal textarea{width:100%;height:200px;margin:10px 0;padding:10px;font-size:14px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box}
        .modal input[type=password]{padding:8px;font-size:14px;width:200px;margin:10px 0;box-sizing:border-box}
        .modal button{padding:8px 16px;font-size:14px;margin:5px;border:none;cursor:pointer;border-radius:4px}
        .modal .btn-save{background:#28a745;color:#fff}
        .modal .btn-cancel{background:#dc3545;color:#fff}
        .modal .btn-confirm{background:#007bff;color:#fff}
        .modal .btn-clear{background:#ffc107;color:#000}
        .error-msg{color:red;font-size:14px;margin-top:10px}
        @media(max-width:600px){body{margin:20px auto;padding:10px}.modal{min-width:280px;padding:20px}}
    </style>
</head>
<body>
    <div class="secret-zone secret-zone-1" onclick="showPasswordPrompt(1)"></div>
    <div class="secret-zone secret-zone-2" onclick="showPasswordPrompt(2)"></div>
    <h1>后台管理页面</h1>
    <p class="hint">点击左上角管理 backend1<br>点击右上角管理 backend2</p>

    <div id="passwordModal" class="modal-overlay">
        <div class="modal">
            <h2 id="passwordTitle">请输入密码</h2>
            <input type="password" id="passwordInput" placeholder="密码" /><br/>
            <button class="btn-confirm" onclick="checkPassword()">确认</button>
            <button class="btn-cancel" onclick="hidePasswordPrompt()">取消</button>
            <div id="passwordError" class="error-msg"></div>
        </div>
    </div>

    <div id="updateModal" class="modal-overlay">
        <div class="modal">
            <h2 id="updateTitle">更新数组数据</h2>
            <p>请输入新的数组数据（每行一个编号，或用逗号分隔）：</p>
            <textarea id="arrayInput" placeholder=""></textarea><br/>
            <button class="btn-save" onclick="saveArray()">保存</button>
            <button class="btn-cancel" onclick="hideUpdateModal()">取消</button>
            <button class="btn-clear" onclick="clearCurrentArray()">一键清除</button>
            <div id="updateMsg" class="error-msg"></div>
        </div>
    </div>

    <script>
        var PASSWORD = "woainimm";
        var currentZone = 0;
        var dataObj = { frontend: [], backend1: [], backend2: [] };

        async function loadData() {
            try {
                var resp = await fetch("/api/data");
                if (resp.ok) {
                    dataObj = await resp.json();
                }
            } catch(e) {
                console.error("load error:", e);
            }
        }

        async function saveDataToStorage() {
            await fetch("/api/data", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(dataObj)
            });
        }

        loadData();

        function showPasswordPrompt(zone) {
            currentZone = zone;
            document.getElementById("passwordModal").style.display = "block";
            document.getElementById("passwordTitle").textContent = "Backend" + zone + " - 请输入密码";
            document.getElementById("passwordInput").value = "";
            document.getElementById("passwordError").textContent = "";
            document.getElementById("passwordInput").focus();
        }

        function hidePasswordPrompt() {
            document.getElementById("passwordModal").style.display = "none";
        }

        function checkPassword() {
            if (document.getElementById("passwordInput").value === PASSWORD) {
                hidePasswordPrompt();
                showUpdateModal();
            } else {
                document.getElementById("passwordError").textContent = "密码错误！";
            }
        }

        document.getElementById("passwordInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") checkPassword();
        });

        function showUpdateModal() {
            document.getElementById("updateModal").style.display = "block";
            document.getElementById("updateTitle").textContent = "Backend" + currentZone + " - 更新数组数据";
            var arr = currentZone === 1 ? dataObj.backend1 : dataObj.backend2;
            document.getElementById("arrayInput").value = (arr || []).join("\n");
            document.getElementById("updateMsg").textContent = "";
        }

        function hideUpdateModal() {
            document.getElementById("updateModal").style.display = "none";
        }

        function clearCurrentArray() {
            if (confirm("确定要清除当前数组吗？")) {
                document.getElementById("arrayInput").value = "";
                document.getElementById("updateMsg").textContent = "";
            }
        }

        function parseInput(input) {
            if (!input.trim()) return [];
            return input.split(/\W+/).map(function(s){return s.trim();}).filter(function(s){return /\d/.test(s);}).map(function(s){return s.replace(/^[^0-9]*/,"").replace(/[^0-9]+$/,"");});
        }

        async function saveArray() {
            var input = document.getElementById("arrayInput").value.trim();
            var msgEl = document.getElementById("updateMsg");
            
            // Reload data to get latest
            await loadData();
            
            var newArray = parseInput(input);
            if (newArray.length === 0 && input !== "") {
                msgEl.textContent = "没有有效的数据！";
                msgEl.style.color = "red";
                return;
            }
            
            if (currentZone === 1) {
                dataObj.backend1 = newArray;
            } else {
                dataObj.backend2 = newArray;
            }
            
            await saveDataToStorage();
            msgEl.textContent = "保存成功！共 " + newArray.length + " 条数据。";
            msgEl.style.color = "green";
            setTimeout(hideUpdateModal, 2000);
        }
    </script>
</body>
</html>
