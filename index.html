<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订单号生成器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --card: #1a2234;
    --border: #2a3a52;
    --accent: #00d4aa;
    --accent-dim: rgba(0, 212, 170, 0.15);
    --accent-glow: rgba(0, 212, 170, 0.4);
    --text: #e2e8f0;
    --text-dim: #7a8ba7;
    --danger: #ff6b6b;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Noto Sans SC', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridMove 20s linear infinite;
    z-index: 0;
  }

  @keyframes gridMove {
    0% { transform: translate(0, 0); }
    100% { transform: translate(60px, 60px); }
  }

  /* Glow orb */
  .orb {
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,212,170,0.08) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
    animation: orbPulse 6s ease-in-out infinite;
  }

  @keyframes orbPulse {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    padding: 20px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 36px;
    box-shadow: 0 0 60px rgba(0,212,170,0.05), 0 20px 60px rgba(0,0,0,0.4);
    animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .header .icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: var(--accent-dim);
    border: 1px solid rgba(0,212,170,0.25);
    margin-bottom: 16px;
    font-size: 24px;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .header p {
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 300;
  }

  .label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 20px;
  }

  .input-wrap input {
    width: 100%;
    padding: 14px 16px;
    padding-right: 44px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 15px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
  }

  .input-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .input-wrap input::placeholder {
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 13px;
  }

  .input-wrap .clear-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    display: none;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, color 0.2s;
  }

  .input-wrap .clear-btn:hover {
    background: rgba(255,255,255,0.08);
    color: var(--text);
  }

  .input-wrap .clear-btn.visible {
    display: flex;
  }

  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-primary {
    background: var(--accent);
    color: #0a0e17;
  }

  .btn-primary:hover {
    box-shadow: 0 0 24px var(--accent-glow);
    transform: translateY(-1px);
  }

  .btn-primary:active {
    transform: translateY(0);
  }

  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .result-area {
    margin-top: 24px;
    display: none;
    animation: fadeSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .result-area.visible {
    display: block;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .result-label span {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }

  .copy-btn {
    padding: 4px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .copy-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .copy-btn.copied {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .url-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    word-break: break-all;
    line-height: 1.7;
    margin-bottom: 16px;
    user-select: all;
  }

  .open-btn {
    background: transparent;
    border: 1.5px solid var(--accent);
    color: var(--accent);
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .open-btn:hover {
    background: var(--accent-dim);
    box-shadow: 0 0 16px rgba(0,212,170,0.15);
  }

  /* History */
  .history {
    margin-top: 32px;
    border-top: 1px solid var(--border);
    padding-top: 24px;
  }

  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .history-header span {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }

  .history-clear {
    font-size: 11px;
    color: var(--text-dim);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: color 0.2s;
  }

  .history-clear:hover {
    color: var(--danger);
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 200px;
    overflow-y: auto;
  }

  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-track { background: transparent; }
  .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--mono);
    font-size: 12px;
    animation: fadeSlideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .history-item:hover {
    border-color: var(--border);
    background: var(--card);
  }

  .history-item .no {
    color: var(--text-dim);
  }

  .history-item .arrow {
    color: var(--accent);
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .history-item:hover .arrow {
    opacity: 1;
  }

  .history-empty {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    padding: 16px;
    opacity: 0.6;
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 20px;
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="orb"></div>

<div class="container">
  <div class="card">
    <div class="header">
      <div class="icon">🔗</div>
      <h1>订单号链接生成器</h1>
      <p>输入订单号，自动生成 Base64 编码查询链接</p>
    </div>

    <div class="input-wrap">
      <label class="label">订单号</label>
      <input type="text" id="orderInput" placeholder="例如 JC001165242606171056" autocomplete="off" spellcheck="false">
      <button class="clear-btn" id="clearBtn" title="清空">✕</button>
    </div>

    <button class="btn btn-primary" id="generateBtn" disabled>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      生成链接
    </button>

    <div class="result-area" id="resultArea">
      <div class="result-label">
        <span>生成结果</span>
        <button class="copy-btn" id="copyBtn">复制链接</button>
      </div>
      <div class="url-box" id="urlBox"></div>
      <button class="open-btn" id="openBtn">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6 3h7v7M3 13h10a2 2 0 002-2V5M1 11l8-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        打开链接
      </button>
    </div>

    <div class="history" id="historySection">
      <div class="history-header">
        <span>历史记录</span>
        <button class="history-clear" id="historyClearBtn">清空</button>
      </div>
      <div class="history-list" id="historyList">
        <div class="history-empty">暂无记录</div>
      </div>
    </div>

    <div class="footer">
      目标: fgpj.gxslyjoa.com:9696
    </div>
  </div>
</div>

<script>
  const BASE_URL = 'http://fgpj.gxslyjoa.com:9696/#/record?no=';
  const STORAGE_KEY = 'order_tool_history';

  const input = document.getElementById('orderInput');
  const clearBtn = document.getElementById('clearBtn');
  const generateBtn = document.getElementById('generateBtn');
  const resultArea = document.getElementById('resultArea');
  const urlBox = document.getElementById('urlBox');
  const copyBtn = document.getElementById('copyBtn');
  const openBtn = document.getElementById('openBtn');
  const historyList = document.getElementById('historyList');
  const historyClearBtn = document.getElementById('historyClearBtn');

  let currentUrl = '';

  // Input handling
  input.addEventListener('input', () => {
    const val = input.value.trim();
    generateBtn.disabled = !val;
    clearBtn.classList.toggle('visible', val.length > 0);
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && input.value.trim()) generate();
  });

  clearBtn.addEventListener('click', () => {
    input.value = '';
    input.focus();
    generateBtn.disabled = true;
    clearBtn.classList.remove('visible');
  });

  // Generate
  generateBtn.addEventListener('click', generate);

  function generate() {
    const orderNo = input.value.trim();
    if (!orderNo) return;

    const encoded = btoa(orderNo);
    currentUrl = BASE_URL + encoded;

    // Show result with animation
    resultArea.classList.remove('visible');
    requestAnimationFrame(() => {
      urlBox.textContent = currentUrl;
      resultArea.classList.add('visible');
    });

    // Save to history
    saveHistory(orderNo);
    renderHistory();
  }

  // Copy
  copyBtn.addEventListener('click', () => {
    if (!currentUrl) return;
    navigator.clipboard.writeText(currentUrl).then(() => {
      copyBtn.textContent = '已复制 ✓';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = '复制链接';
        copyBtn.classList.remove('copied');
      }, 1500);
    });
  });

  // Open
  openBtn.addEventListener('click', () => {
    if (currentUrl) window.open(currentUrl, '_blank');
  });

  // History
  function getHistory() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch { return []; }
  }

  function saveHistory(orderNo) {
    let list = getHistory();
    list = list.filter(n => n !== orderNo);
    list.unshift(orderNo);
    if (list.length > 20) list = list.slice(0, 20);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  }

  function renderHistory() {
    const list = getHistory();
    if (!list.length) {
      historyList.innerHTML = '<div class="history-empty">暂无记录</div>';
      return;
    }
    historyList.innerHTML = list.map((no, i) => `
      <div class="history-item" data-no="${no}" style="animation-delay:${i * 30}ms">
        <span class="no">${no}</span>
        <span class="arrow">→</span>
      </div>
    `).join('');

    historyList.querySelectorAll('.history-item').forEach(item => {
      item.addEventListener('click', () => {
        input.value = item.dataset.no;
        input.dispatchEvent(new Event('input'));
        generate();
      });
    });
  }

  historyClearBtn.addEventListener('click', () => {
    localStorage.removeItem(STORAGE_KEY);
    renderHistory();
  });

  // Init
  renderHistory();
  input.focus();
</script>

</body>
</html>
